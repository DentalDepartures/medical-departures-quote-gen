[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Rewrite /api/extract → Netlify function so the frontend needs zero changes
[[redirects]]
  from = "/api/extract"
  to = "/.netlify/functions/extract"
  status = 200

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
