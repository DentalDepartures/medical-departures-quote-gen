[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

# Rewrite /api/* → Netlify functions
[[redirects]]
  from = "/api/extract"
  to = "/.netlify/functions/extract"
  status = 200

[[redirects]]
  from = "/api/clinics"
  to = "/.netlify/functions/clinics"
  status = 200

[[redirects]]
  from = "/api/generate-pdf"
  to = "/.netlify/functions/generate-pdf"
  status = 200

[[redirects]]
  from = "/api/upload-drive"
  to = "/.netlify/functions/upload-drive"
  status = 200

[[redirects]]
  from = "/api/log-quote"
  to = "/.netlify/functions/log-quote"
  status = 200

[[edge_functions]]
  function = "fetch-template"
  path = "/api/fetch-template"

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
