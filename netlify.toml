[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

# All API routes served by Edge Functions (Deno/Cloudflare Workers).
# Edge Functions have no AWS Lambda 4KB env-var limit, so GOOGLE_SERVICE_ACCOUNT_JSON fits.

[[edge_functions]]
  function = "extract"
  path = "/api/extract"

[[edge_functions]]
  function = "clinics"
  path = "/api/clinics"

[[edge_functions]]
  function = "fetch-template"
  path = "/api/fetch-template"

[[edge_functions]]
  function = "report-error"
  path = "/api/report-error"

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
